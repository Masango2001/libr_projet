<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier un livre</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/books.css">
    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/books.js" defer></script>
</head>
<body>
    <button type="button" class="back-button" onclick="history.length > 1 ? history.back() : window.location.href='../dashboard/dashboard.html'">Retour</button>
    <main class="container">
        <div class="page-header">
            <div>
                <h1>Modifier un livre</h1>
                <p>Mettez a jour le catalogue.</p>
            </div>
            <a href="books.html" class="btn btn-secondary">Retour</a>
        </div>

        <form id="editBookForm">
            <label for="title">Titre</label>
            <input type="text" id="title" required>

            <label for="author">Auteur</label>
            <select id="author" required></select>

            <label for="category">Categorie</label>
            <select id="category" required></select>

            <label for="isbn">ISBN</label>
            <input type="text" id="isbn" required>

            <label for="totalCopies">Exemplaires</label>
            <input type="number" id="totalCopies" min="1" required>

            <label for="availableCopies">Disponibles</label>
            <input type="number" id="availableCopies" min="0" required>

            <button type="submit" class="btn btn-primary">Mettre a jour</button>
        </form>
    </main>
</body>
</html>
