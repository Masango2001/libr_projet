<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier categorie</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/categories.css">
    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/categories.js" defer></script>
</head>
<body>
    <button type="button" class="back-button" onclick="history.length > 1 ? history.back() : window.location.href='../dashboard/dashboard.html'">Retour</button>
    <main class="container">
        <div class="page-header">
            <div>
                <h1>Modifier une categorie</h1>
                <p>Mettez a jour la classification.</p>
            </div>
            <a href="categories.html" class="btn btn-secondary">Retour</a>
        </div>

        <form id="editForm">
            <label for="name">Nom</label>
            <input type="text" id="name" required>

            <label for="description">Description</label>
            <textarea id="description" rows="5"></textarea>

            <button type="submit" class="btn btn-primary">Modifier</button>
        </form>
    </main>
</body>
</html>
