<!DOCTYPE html>
<html>
<head>
    <title>Author Details</title>
    <link rel="stylesheet" href="authors.css">
</head>
<body>

<div class="container">
    <div class="card" id="details"></div>
</div>

<script src="authors.js"></script>

<script>
const id = new URLSearchParams(location.search).get("id");

async function load() {
    const a = await getAuthorById(id);

    document.getElementById("details").innerHTML = `
        <h2>${a.name}</h2>
        <p>${a.biography}</p>
        <p>Status: ${a.isActive ? "Active" : "Inactive"}</p>
    `;
}

load();
</script>

</body>
</html>
