<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier un auteur</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/authors.css">
    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/authors.js" defer></script>
</head>
<body>
    <button type="button" class="back-button" onclick="history.length > 1 ? history.back() : window.location.href='../dashboard/dashboard.html'">Retour</button>
    <main class="container">
        <div class="page-header">
            <div>
                <h1>Modifier un auteur</h1>
                <p>Mettez a jour les informations de l'auteur.</p>
            </div>
            <a href="authors.html" class="btn btn-secondary">Retour</a>
        </div>

        <form id="editAuthorForm">
            <label for="firstName">Prenom</label>
            <input id="firstName" type="text" required>

            <label for="lastName">Nom</label>
            <input id="lastName" type="text" required>

            <label for="nationality">Nationalite</label>
            <input id="nationality" type="text">

            <label for="biography">Biographie</label>
            <textarea id="biography" rows="5"></textarea>

            <button type="submit" class="btn btn-primary">Mettre a jour</button>
        </form>
    </main>
</body>
</html>
