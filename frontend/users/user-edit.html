<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier utilisateur</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/users.css">
    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/users.js" defer></script>
</head>
<body>
    <button type="button" class="back-button" onclick="history.length > 1 ? history.back() : window.location.href='../dashboard/dashboard.html'">Retour</button>
    <main class="container">
        <div class="page-header">
            <div>
                <h1>Modifier utilisateur</h1>
                <p>Mettez a jour les informations du compte.</p>
            </div>
            <a href="users.html" class="btn btn-secondary">Retour</a>
        </div>

        <form id="editUserForm">
            <label for="firstName">Prenom</label>
            <input type="text" id="firstName" required>

            <label for="lastName">Nom</label>
            <input type="text" id="lastName" required>

            <label for="email">Email</label>
            <input type="email" id="email" required>

            <label for="role">Role</label>
            <select id="role">
                <option value="member">Member</option>
                <option value="librarian">Librarian</option>
            </select>

            <button type="submit" class="btn btn-primary">Enregistrer</button>
        </form>
    </main>
</body>
</html>
