<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvel emprunt</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/borrows.css">
    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/borrows.js" defer></script>
</head>
<body>
    <button type="button" class="back-button" onclick="history.length > 1 ? history.back() : window.location.href='../dashboard/dashboard.html'">Retour</button>
    <main class="container">
        <div class="page-header">
            <div>
                <h1>Nouvel emprunt</h1>
                <p>Selectionnez un livre disponible.</p>
            </div>
            <a href="borrows.html" class="btn btn-secondary">Retour</a>
        </div>

        <form id="borrowForm">
            <label for="book">Livre</label>
            <select id="book" required></select>

            <label for="dueDate">Date retour prevue</label>
            <input type="date" id="dueDate" required>

            <button type="submit" class="btn btn-primary">Emprunter</button>
        </form>
    </main>
</body>
</html>
